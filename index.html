<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Flow | Dashboard</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --success: #00C851;
            --session: #aa66ff;
            --creds: #33b5e5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 50%, #1a202c 0%, #0b0e14 100%);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .system-status {
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: grid;
            gap: 20px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Settings Area */
        .session-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            width: 100%;
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: border 0.3s;
        }

        .session-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            font-size: 0.9rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* History Area */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--border);
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            gap: 10px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-session {
            background: var(--session);
            color: white;
        }

        .badge-creds {
            background: var(--creds);
            color: white;
        }

        .badge-local {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        .refresh-btn {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Notifications */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: black;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }

            .history-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Cloud Flow</h1>
        <div class="system-status">
            <span class="status-dot"></span>
            System Active
        </div>
    </div>

    <div class="container">
        <!-- Session Manager -->
        <div class="card">
            <div class="card-title">Account Settings (Local)</div>
            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 15px;">
                Enter your MEGA Session ID here. It stays in your browser and is only used to sync this dashboard's
                history.
            </p>
            <input type="password" id="sessionInput" class="session-input" placeholder="Paste MEGA Session ID...">
            <button onclick="saveSession()" class="btn">Update Session ID</button>
        </div>

        <!-- Recent Uploads -->
        <div class="card">
            <div class="card-title">
                Recent Activity
                <span class="refresh-btn" onclick="fetchStatus()">Check Status</span>
            </div>
            <div id="historyList" class="history-list">
                <div class="empty-state">No history found on MEGA. History is now stored in your extension.</div>
            </div>
        </div>

        <div id="env-diagnostic"
            style="font-size: 0.7rem; color: rgba(255,255,255,0.2); text-align: center; margin-top: 20px;">
            Connecting to backend...
        </div>
    </div>

    <div id="toast">Settings Saved!</div>

    <script>
        const API_URL = window.location.origin;

        // Load Session on start
        const savedSid = localStorage.getItem('MEGA_SESSION');
        if (savedSid) document.getElementById('sessionInput').value = savedSid;

        function saveSession() {
            const sid = document.getElementById('sessionInput').value.trim();
            localStorage.setItem('MEGA_SESSION', sid);
            showToast();
            fetchStatus();
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function fetchStatus() {
            const diag = document.getElementById('env-diagnostic');
            try {
                const res = await fetch(`${API_URL}/api/history`);
                const data = await res.json();

                if (data.status === 'online') {
                    diag.innerHTML = `Backend: ${data.status} | Session: ${data.envStatus.MEGA_SESSION} | Mode: ${data.envStatus.HISTORY_MODE}`;
                }
            } catch (e) {
                diag.innerHTML = 'Backend Connection Failed';
            }
        }

        // Initialize
        fetchStatus();

        // Note: Real history is now in extension popup. 
        // This dashboard serves as the System Master and Config center.
    </script>
</body>

</html>
