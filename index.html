<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Cloud Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--card-bg);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dashboard-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .file-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .file-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
            margin-right: 0.5rem;
        }

        .item-status {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .live-indicator {
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .refresh-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .refresh-btn:hover {
            text-decoration: underline;
        }

        .error {
            text-align: center;
            padding: 2rem;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            border-radius: 16px;
            border: 1px dashed rgba(239, 68, 68, 0.2);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Cloud Flow</h1>
            <div class="status-badge"
                style="display: flex; align-items: center; justify-content: center; margin: 0 auto; width: fit-content;">
                <div class="live-indicator"></div>
                System Active
            </div>
        </header>

        <div class="dashboard-card">
            <div class="section-title">
                Recent Uploads
                <button class="refresh-btn" onclick="fetchHistory()">Refresh</button>
            </div>

            <ul id="history-list" class="history-list">
                <!-- Data will be loaded here -->
            </ul>
        </div>
    </div>

    <script>
        const historyList = document.getElementById('history-list');

        function renderHistory(history) {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-state">No uploads yet. Open a PDF to start!</div>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <li class="history-item">
                    <div class="item-info">
                        <span class="file-name">${item.fileName}</span>
                        <span class="file-meta">Folder: ${item.chapter} • ${new Date(item.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="item-status">
                        <div class="status-dot"></div>
                        Uploaded
                    </div>
                </li>
            `).join('');
        }

        async function fetchHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();

                if (response.ok) {
                    renderHistory(data);
                } else {
                    const errorMsg = data.error || 'Unknown Error';
                    const details = data.details || 'Check Vercel Environment Variables';
                    historyList.innerHTML = `<div class="error">
                        ${errorMsg}<br>
                        <small style="font-size: 10px; color: #ff8e8e; opacity: 0.8;">${details}</small>
                    </div>`;
                }
            } catch (error) {
                historyList.innerHTML = '<div class="error">Failed to connect to API</div>';
            }
        }

        // Initial load
        fetchHistory();
        // Auto refresh every 30 seconds
        setInterval(fetchHistory, 30000);
    </script>
</body>

</html>
