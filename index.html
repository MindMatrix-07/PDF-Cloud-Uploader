<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Flow | Live Status</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --success: #00e676;
            --error: #ff5252;
            --start: #ffd740;
            --detect: #40c4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 50%, #1a202c 0%, #0b0e14 100%);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            font-weight: 800;
        }

        .system-status {
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 20px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }

        /* Session Manager */
        .session-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .session-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 14px;
            color: white;
            flex: 1;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .session-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        /* Activity Feed */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .feed::-webkit-scrollbar {
            width: 4px;
        }

        .feed::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .event {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 18px;
            display: flex;
            gap: 18px;
            border: 1px solid transparent;
            transition: all 0.3s;
            animation: slideIn 0.4s ease-out;
        }

        .event:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .icon-detect {
            background: rgba(64, 196, 255, 0.1);
            color: var(--detect);
        }

        .icon-start {
            background: rgba(255, 215, 64, 0.1);
            color: var(--start);
        }

        .icon-success {
            background: rgba(0, 230, 118, 0.1);
            color: var(--success);
        }

        .icon-error {
            background: rgba(255, 82, 82, 0.1);
            color: var(--error);
        }

        .event-body {
            flex: 1;
            min-width: 0;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .event-msg {
            font-weight: 600;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-time {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .event-detail {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
        }

        #env-diagnostic {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            margin-top: 30px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Cloud Flow</h1>
        <div class="system-status">
            <span class="status-dot"></span>
            Live Monitoring Active
        </div>
    </div>

    <div class="container">
        <!-- Settings -->
        <div class="card">
            <div class="card-title">Session Configuration</div>
            <div class="session-group">
                <input type="password" id="sessionInput" class="session-input" placeholder="Paste MEGA Session ID...">
                <button onclick="saveSession()" class="btn">Update Session</button>
            </div>
            <p style="font-size: 0.75rem; color: rgba(255,255,255,0.3);">Session ID is stored locally in your browser
                for secure syncing.</p>
        </div>

        <!-- Live Feed -->
        <div class="card">
            <div class="card-title">
                Activity Relay
                <span style="color: var(--primary); cursor: pointer;" onclick="refreshFeed()">Refresh</span>
            </div>
            <div id="feed" class="feed">
                <div class="empty-state">Waiting for extension activity...</div>
            </div>
        </div>

        <div id="env-diagnostic">Initializing connections...</div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let lastActivityJson = "";

        // Load Session
        const savedSid = localStorage.getItem('MEGA_SESSION');
        if (savedSid) document.getElementById('sessionInput').value = savedSid;

        function saveSession() {
            const sid = document.getElementById('sessionInput').value.trim();
            localStorage.setItem('MEGA_SESSION', sid);
            alert("Session updated locally!");
        }

        async function refreshFeed() {
            const feedDiv = document.getElementById('feed');
            const diag = document.getElementById('env-diagnostic');

            try {
                const res = await fetch(`${API_URL}/api/history`);
                const data = await res.json();

                if (data.status === 'online') {
                    diag.innerHTML = `Backend: Online | Mode: Live Relay | Session(Env): ${data.envStatus.MEGA_SESSION}`;

                    const activity = data.activity || [];
                    const currentJson = JSON.stringify(activity);

                    if (currentJson !== lastActivityJson) {
                        lastActivityJson = currentJson;
                        renderFeed(activity);
                    }
                }
            } catch (e) {
                diag.innerHTML = 'Backend Connection Lost';
            }
        }

        function renderFeed(activity) {
            const feedDiv = document.getElementById('feed');
            if (activity.length === 0) {
                feedDiv.innerHTML = '<div class="empty-state">No recent activity detected.</div>';
                return;
            }

            feedDiv.innerHTML = activity.map(event => {
                const iconMap = {
                    'DETECT': { emoji: '🚀', class: 'icon-detect' },
                    'START': { emoji: '⏳', class: 'icon-start' },
                    'SUCCESS': { emoji: '✅', class: 'icon-success' },
                    'ERROR': { emoji: '🚨', class: 'icon-error' }
                };
                const icon = iconMap[event.type] || { emoji: '•', class: '' };
                const timeStr = new Date(event.timestamp).toLocaleTimeString();

                return `
                    <div class="event">
                        <div class="event-icon ${icon.class}">${icon.emoji}</div>
                        <div class="event-body">
                            <div class="event-header">
                                <span class="event-msg">${event.message}</span>
                                <span class="event-time">${timeStr}</span>
                            </div>
                            <div class="event-detail">${event.detail}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Auto-refresh every 2 seconds
        setInterval(refreshFeed, 2000);
        refreshFeed();
    </script>
</body>

</html>
