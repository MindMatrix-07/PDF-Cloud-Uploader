<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fafafa;
    }

    h3 {
      margin-top: 0;
      color: #333;
    }

    .status {
      color: #666;
      font-size: 11px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .url-box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 10px;
      word-break: break-all;
      font-size: 11px;
      max-height: 80px;
      overflow-y: auto;
      border-radius: 8px;
    }

    .settings {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 11px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    .live-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h3>Khazana Snatcher</h3>

  <div class="status">DETECTION STATUS:</div>
  <div id="url" class="url-box">No PDF currently detected.</div>

  <div class="settings">
    <div class="status">MEGA SESSION ID:</div>
    <input type="password" id="session-id" placeholder="Paste your Session ID here...">
    <button id="save-session">Save Session ID</button>
  </div>

  <a href="https://pdf-cloud-uploader.vercel.app/" target="_blank" class="live-link">
    Open Live Dashboard for Upload History 🌐
  </a>

  <div id="logs-container" style="margin-top: 15px; display: none;">
    <div class="status">DEBUG LOGS:</div>
    <div id="logs"
      style="font-size: 9px; color: #888; background: #eee; padding: 5px; border-radius: 4px; max-height: 100px; overflow-y: auto;">
    </div>
    <button id="clear-logs" style="font-size: 9px; background: #666; padding: 5px;">Clear Logs</button>
  </div>

  <button id="toggle-logs"
    style="background: none; border: none; font-size: 10px; color: #999; text-decoration: underline; margin-top: 10px; cursor: pointer;">
    Show Debug Logs
  </button>

  <script src="popup.js"></script>
</body>

</html>
