<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 300px;
      padding: 14px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fafafa;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    h3 {
      margin: 0;
      color: #333;
      font-size: 1rem;
    }

    /* Toggle Switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ccc;
      border-radius: 22px;
      transition: .3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .3s;
    }

    input:checked+.slider {
      background-color: #007bff;
    }

    input:checked+.slider:before {
      transform: translateX(18px);
    }

    .status {
      color: #666;
      font-size: 11px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .url-box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 8px 10px;
      word-break: break-all;
      font-size: 11px;
      max-height: 70px;
      overflow-y: auto;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .settings {
      border-top: 1px solid #eee;
      padding-top: 12px;
      margin-top: 4px;
    }

    input[type="password"] {
      width: 100%;
      padding: 9px;
      margin-top: 6px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 11px;
      box-sizing: border-box;
    }

    button.main {
      width: 100%;
      padding: 9px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      font-weight: bold;
      transition: background 0.2s;
      font-size: 12px;
    }

    button.main:hover {
      background: #0056b3;
    }

    a.live-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 11px;
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }

    #toggle-logs {
      background: none;
      border: none;
      font-size: 10px;
      color: #999;
      text-decoration: underline;
      margin-top: 10px;
      cursor: pointer;
      width: 100%;
    }

    #logs {
      font-size: 9px;
      color: #888;
      background: #eee;
      padding: 5px;
      border-radius: 4px;
      max-height: 100px;
      overflow-y: auto;
    }

    #clear-logs {
      font-size: 9px;
      background: #666;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="top-row">
    <h3>Khazana Snatcher</h3>
    <div class="toggle-wrap">
      <span id="toggle-label">ON</span>
      <label class="switch">
        <input type="checkbox" id="ext-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="status">LAST DETECTED:</div>
  <div id="url" class="url-box">No PDF currently detected.</div>

  <div class="settings">
    <div class="status">MEGA SESSION ID:</div>
    <input type="password" id="session-id" placeholder="Paste your Session ID here...">
    <button class="main" id="save-session">Save Session ID</button>
  </div>

  <a href="https://pdf-cloud-uploader.vercel.app/" target="_blank" class="live-link">
    Open Live Dashboard 🌐
  </a>

  <button id="toggle-logs">Show Debug Logs</button>
  <div id="logs-container" style="display:none;">
    <div id="logs">No logs...</div>
    <button id="clear-logs">Clear Logs</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
